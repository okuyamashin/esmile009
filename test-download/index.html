<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト用 Excel ダウンロード</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
      line-height: 1.6;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #1f2937;
    }

    main {
      width: min(100%, 480px);
      margin: 24px;
      padding: 32px 28px;
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
      font-size: 0.95rem;
    }

    .filename {
      margin-bottom: 24px;
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      word-break: break-all;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .download-btn:hover {
      background: #1d4ed8;
    }

    .note {
      margin-top: 18px;
      font-size: 0.82rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main>
    <h1>テスト用 Excel ダウンロード</h1>
    <p>PDF 変換の動作確認用に、完了報告書のサンプル Excel を配布します。</p>
    <div class="filename">完了報告書_2544094.xlsx</div>
    <a class="download-btn" href="__DOWNLOAD_URL__" download="完了報告書_2544094.xlsx">Excel をダウンロード</a>
    <p class="note">ボタンを押すとファイルがダウンロードされます。</p>
  </main>
</body>
</html>

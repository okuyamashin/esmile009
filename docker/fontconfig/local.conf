<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- MS Ｐゴシック → VL Gothic（メトリクス互換の自由フォント） -->
  <alias binding="strong">
    <family>MS PGothic</family>
    <prefer><family>VL Gothic</family></prefer>
  </alias>
  <alias binding="strong">
    <family>MS Pゴシック</family>
    <prefer><family>VL Gothic</family></prefer>
  </alias>
  <alias binding="strong">
    <family>ＭＳ Ｐゴシック</family>
    <prefer><family>VL Gothic</family></prefer>
  </alias>
  <alias binding="strong">
    <family>ＭＳ Ｐゴシック</family>
    <prefer><family>VL Gothic</family></prefer>
  </alias>
</fontconfig>

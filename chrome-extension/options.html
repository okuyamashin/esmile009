<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>esmile009 設定</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 1.25rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      label {
        font-weight: 600;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.5rem 0.6rem;
      }
      .row {
        margin: 1rem 0;
      }
      #status {
        margin-top: 0.75rem;
        white-space: pre-wrap;
      }
      small {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>esmile009 設定</h1>
    <p><small><code>/health</code> や <code>/convert</code> の<strong>共通プレフィックス</strong>だけを書きます（末尾スラッシュはなくてよい）</small></p>
    <div class="row">
      <label for="apiBaseUrl">API のベース URL</label>
      <input id="apiBaseUrl" type="text" spellcheck="false" />
    </div>
    <button id="save" type="button">保存</button>
    <div id="status" aria-live="polite"></div>
    <script src="options.js"></script>
  </body>
</html>

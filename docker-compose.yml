services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: xlsx2pdf-libreoffice:local
    container_name: xlsx2pdf-api
    # BIND_ADDRESS は「どの NIC にポートを張るか」。別サーバーの Apache から IP で転送するときは 0.0.0.0（.env で指定）
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:18083:8080"
    environment:
      MAX_UPLOAD_BYTES: "15728640"
      CONVERT_TIMEOUT_SEC: "120"
      ACCESS_LOG_FILE: "/var/log/esmile009/access.log"
      CONVERT_SAVE_DIR: "/var/lib/esmile009/convert"
    volumes:
      - ./samples/in:/app/samples/in:ro
      - ./logs:/var/log/esmile009
      - ./data/convert:/var/lib/esmile009/convert
    restart: unless-stopped
